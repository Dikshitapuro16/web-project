<!DOCTYPE html>
<html>
<head>
    <title>Contact Form</title>
</head>
<body>

    <h1>Contact Us</h1>

    <p>Please fill out the form below:</p>

    <form>

        <!-- Text Input -->
        <label>Full Name:</label><br>
        <input type="text" name="fullname"><br><br>

        <!-- Email Input -->
        <label>Email Address:</label><br>
        <input type="email" name="email"><br><br>

        <!-- Phone Number -->
        <label>Mobile Number:</label><br>
        <input type="tel" name="mobile"><br><br>

        <!-- Dropdown Menu -->
        <label>Select Your Course:</label><br>
        <select name="course">
            <option>BBA</option>
            <option>BSc IT</option>
            <option>B.Com</option>
            <option>M.COM</option>
        </select><br><br>

        <!-- Checkboxes -->
        <label>Skills Known:</label><br>
        <input type="checkbox" name="skills" value="html"> HTML<br>
        <input type="checkbox" name="skills" value="css"> CSS<br>
        <input type="checkbox" name="skills" value="javascript"> JavaScript<br><br>

        <!-- Message -->
        <label>Message:</label><br>
        <textarea rows="4" cols="30"></textarea><br><br>

        <!-- Submit Button -->
        <input type="submit" value="Submit">
        <input type="reset" value="Reset">

    </form>

</body>
</html>
