

<!DOCTYPE html>
<html>
<head>
    <title>Web Page with Navbar and Footer</title>

    <style>
        /* Body Styling */
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        /* Navigation Bar */
        .navbar {
            background-color: #333;
            overflow: hidden;
        }

        .navbar a {
            float: left;
            color: white;
            text-align: center;
            padding: 14px 20px;
            text-decoration: none;
        }

        .navbar a:hover {
            background-color: #575757;
        }

        /* Content Section */
        .content {
            padding: 20px;
            text-align: center;
        }

        /* Footer */
        .footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 10px;
            position: fixed;
            width: 100%;
            bottom: 0;
        }
    </style>
</head>

<body>

    <!-- Navigation Bar -->
    <div class="navbar">
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Services</a>
        <a href="#">Contact</a>
    </div>

    <!-- Main Content -->
    <div class="content">
        <h1>Welcome to My Website</h1>
        <p>This is a simple webpage with a navigation bar and footer.</p>
    </div>

    <!-- Footer -->
    <div class="footer">
        <p>© 2026 My Website | All Rights Reserved</p>
    </div>

</body>
</html>
