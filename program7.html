<!DOCTYPE html>
<html>
<head>
    <title>Styled Table and Form</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        /* Table Styling */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 30px;
            background-color: white;
        }

        th, td {
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }

        th {
            background-color: #4CAF50;
            color: white;
        }

        tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        /* Form Styling */
        form {
            background-color: white;
            padding: 20px;
            border: 1px solid #ccc;
            width: 50%;
            margin: auto;
            border-radius: 8px;
        }

        input, select {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        input[type="submit"] {
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }

        input[type="submit"]:hover {
            background-color: #45a049;
        }
    </style>
</head>

<body>

    <h1>Student Information</h1>

    <!-- Table -->
    <table>
        <tr>
            <th>Name</th>
            <th>Course</th>
            <th>Marks</th>
        </tr>
        <tr>
            <td>Rahul</td>
            <td>BBA</td>
            <td>85</td>
        </tr>
        <tr>
            <td>Sneha</td>
            <td>B.COM</td>
            <td>90</td>
        </tr>
        <tr>
            <td>Amit</td>
            <td>MBA</td>
            <td>78</td>
        </tr>
    </table>

    <!-- Form -->
    <h1>Registration Form</h1>

    <form>
        <label>Full Name:</label>
        <input type="text" placeholder="Enter your name">

        <label>Email:</label>
        <input type="email" placeholder="Enter your email">

        <label>Course:</label>
        <select>
            <option>BBA</option>
            <option>B.COM</option>
            <option>MBA</option>
        </select>

        <input type="submit" value="Register">
    </form>

</body>
</html>
