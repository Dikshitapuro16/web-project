<!DOCTYPE html>
<html>
<head>
    <title>Multimedia Webpage</title>
</head>
<body>

    <h1>My Multimedia Webpage</h1>

    <p>
        This webpage shows how to add images, links, audio, and video using HTML.
    </p>

    <!-- Image -->
    <h2>Image Example</h2>
    <img src=https://tse1.mm.bing.net/th/id/OIP.sbjQ7OmaGoGqQxdpmFFqcwHaEK?rs=1&pid=ImgDetMain&o=7&rm=3 alt="Sample Image" width="300">

    <!-- Link -->
    <h2>Link Example</h2>
    <p>
        Visit 
        <a href="https://www.google.com" target="_blank">Google</a>
        for more information.
    </p>

    <!-- Audio -->
    <h2>Audio Example</h2>
    <audio controls>
        <source src="C:\Users\RUTIKA\Downloads\Om Krishnaya Vasudevaya Haraye Paramatmane Mantra.mp3" type="audio/mp3">
        Your browser does not support the audio element.
    </audio>

    <!-- Video -->
    <h2>Video Example</h2>
    <video width="400" controls>
        <source src="C:\Users\RUTIKA\Downloads\mov_bbb.mp4" type="video/mp4">
        Your browser does not support the video element.
    </video>
  

    <p>
        This is a simple example of adding multimedia content to a webpage.
    </p>

</body>
</html>
