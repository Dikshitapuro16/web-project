
<!DOCTYPE html>
<html>
<head>
    <title>DOM Manipulation</title>

    <style>
        body {
            text-align: center;
            font-family: Arial;
        }

        button {
            padding: 20px;
            margin: 20px;
            cursor: pointer;
            background-color: Yellow;
        }

        ul {
            list-style-type: none;
        }
    </style>
</head>

<body>

    <h1>Dynamic List</h1>

    <button onclick="addItem()">Add Item</button>
    <button onclick="removeItem()">Remove Item</button>

    <ul id="list">
    </ul>

    <script>
        let count = 1;

        function addItem() {
            let li = document.createElement("li"); // create new element
            li.textContent = "Item " + count;
            document.getElementById("list").appendChild(li); // add to list
            count++;
        }

        function removeItem() {
            let list = document.getElementById("list");
            if (list.lastChild) {
                list.removeChild(list.lastChild); // remove last item
            }
        }
    </script>

</body>
</html>
